<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Платонові тіла</title>

  <style>
    body { margin:0; overflow:hidden; font-family:Arial; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      width:260px;
      padding:10px;
      background:rgba(0,0,0,0.7);
      color:white;
      z-index:10;
    }
    button { width:100%; margin:5px 0; padding:8px; }
    #desc { margin-top:10px; font-size:14px; }
  </style>
</head>
<body>

<div id="ui">
  <button onclick="setSolid('Tetrahedron')">Тетраедр</button>
  <button onclick="setSolid('Cube')">Куб</button>
  <button onclick="setSolid('Octahedron')">Октаедр</button>
  <button onclick="setSolid('Dodecahedron')">Додекаедр</button>
  <button onclick="setSolid('Icosahedron')">Ікосаедр</button>

  <div id="desc"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls, mesh;

const data = {
  Tetrahedron:{title:"Тетраедр",faces:4,vertices:4,edges:6,text:"Найпростіше тіло"},
  Cube:{title:"Куб",faces:6,vertices:8,edges:12,text:"Квадратні грані"},
  Octahedron:{title:"Октаедр",faces:8,vertices:6,edges:12,text:"Трикутники"},
  Dodecahedron:{title:"Додекаедр",faces:12,vertices:20,edges:30,text:"П’ятикутники"},
  Icosahedron:{title:"Ікосаедр",faces:20,vertices:12,edges:30,text:"20 трикутників"}
};

init();
animate();

function init(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth,window.innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera,renderer.domElement);

  const light = new THREE.PointLight(0xffffff,1);
  light.position.set(10,10,10);
  scene.add(light);

  setSolid("Tetrahedron");

  window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}

function geometry(type){
  switch(type){
    case "Tetrahedron": return new THREE.TetrahedronGeometry(1);
    case "Cube": return new THREE.BoxGeometry(1,1,1);
    case "Octahedron": return new THREE.OctahedronGeometry(1);
    case "Dodecahedron": return new THREE.DodecahedronGeometry(1);
    case "Icosahedron": return new THREE.IcosahedronGeometry(1);
  }
}

function setSolid(type){
  if(mesh) scene.remove(mesh);

  mesh = new THREE.Mesh(
    geometry(type),
    new THREE.MeshNormalMaterial()
  );

  scene.add(mesh);

  document.getElementById("desc").innerHTML =
    `<b>${data[type].title}</b><br>${data[type].text}<br>
     Граней: ${data[type].faces}<br>
     Вершин: ${data[type].vertices}<br>
     Ребер: ${data[type].edges}`;
}

function animate(){
  requestAnimationFrame(animate);
  if(mesh) mesh.rotation.y += 0.01;
  controls.update();
  renderer.render(scene,camera);
}
</script>

</body>
</html>
